name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@GuidoAmici"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "newhaze-ui ${{ github.ref_name }}"
          body: |
            ## @GuidoAmici/newhaze-ui ${{ github.ref_name }}

            Install:
            ```
            npm install @GuidoAmici/newhaze-ui@${{ github.ref_name }}
            ```

            Or as an alias (keeps `import from "newhaze-ui"` unchanged):
            ```json
            "newhaze-ui": "npm:@GuidoAmici/newhaze-ui@${{ github.ref_name }}"
            ```
          generate_release_notes: true
